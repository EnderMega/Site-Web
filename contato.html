<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Shirts | Contato</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Quantum Shirts</h1>
            <span>"Vista o conhecimento."</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="precos.html">Preços</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="contato-secao">
            <h2>Fale Conosco</h2>
            <p>Tem alguma dúvida, crítica ou sugestão de estampa? Envie uma mensagem!</p>

            <!-- REQUISITO OBRIGATÓRIO: FORMULÁRIO COMPLETO -->
            <form id="form-contato" novalidate>
                <div class="form-group">
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" placeholder="Digite seu nome">
                </div>

                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" placeholder="exemplo@email.com">
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                </div>

                <div class="form-group">
                    <label for="assunto">Assunto:</label>
                    <input type="text" id="assunto" placeholder="Motivo do contato">
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem aqui (mínimo de 20 caracteres)..."></textarea>
                </div>

                <button type="submit" class="btn">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Quantum Shirts - Todos os direitos reservados.</p>
    </footer>

    <!-- Scripts JQuery e Custom -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
